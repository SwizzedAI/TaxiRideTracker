<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Enigma TaxiLog Pro</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        /* LIGHT THEME */
        body[data-theme="light"] {
            --bg-main: #FFD700;
            --bg-card: #ffffff;
            --bg-input: #f5f5f5;
            --text-primary: #000000;
            --text-secondary: #666666;
            --border-main: #000000;
            --accent-yellow: #FFD700;
            --accent-green: #00e600;
            --accent-red: #ff0000;
            --accent-blue: #0066ff;
        }

        /* DARK THEME */
        body[data-theme="dark"] {
            --bg-main: #000000;
            --bg-card: #1a1a1a;
            --bg-input: #2a2a2a;
            --text-primary: #ffffff;
            --text-secondary: #cccccc;
            --border-main: #FFD700;
            --accent-yellow: #FFD700;
            --accent-green: #00ff00;
            --accent-red: #ff3333;
            --accent-blue: #3399ff;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
            background: var(--bg-main);
            color: var(--text-primary);
            padding: 20px 16px 100px;
            max-width: 600px;
            margin: 0 auto;
            transition: background 0.3s, color 0.3s;
        }

        .header {
            background: var(--accent-yellow);
            border: 5px solid var(--border-main);
            border-radius: 12px;
            padding: 24px;
            margin-bottom: 24px;
            text-align: center;
            position: relative;
        }

        .header h1 {
            font-size: 2rem;
            font-weight: 800;
            color: #000;
            margin-bottom: 4px;
        }

        .header .subtitle {
            font-size: 0.875rem;
            font-weight: 600;
            color: #000;
        }

        .header .version {
            position: absolute;
            top: 10px;
            right: 10px;
            font-size: 0.625rem;
            font-weight: 700;
            background: #000;
            color: var(--accent-yellow);
            padding: 4px 8px;
            border-radius: 4px;
        }

        .theme-toggle-btn {
            position: absolute;
            top: 10px;
            left: 10px;
            width: 36px;
            height: 36px;
            background: #000;
            color: var(--accent-yellow);
            border: 3px solid #000;
            border-radius: 6px;
            font-size: 1rem;
            cursor: pointer;
        }

        .tabs {
            display: flex;
            gap: 8px;
            margin-bottom: 20px;
        }

        .tab {
            flex: 1;
            padding: 14px 8px;
            background: var(--bg-card);
            border: 4px solid var(--border-main);
            border-radius: 8px;
            font-size: 0.75rem;
            font-weight: 700;
            text-align: center;
            cursor: pointer;
            transition: all 0.2s;
            color: var(--text-primary);
        }

        .tab.active {
            background: var(--accent-yellow);
            color: #000;
        }

        .card {
            background: var(--bg-card);
            border: 5px solid var(--border-main);
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 20px;
        }

        .card-title {
            font-size: 1.125rem;
            font-weight: 800;
            margin-bottom: 16px;
            color: var(--text-primary);
        }

        .input-group {
            display: flex;
            gap: 8px;
            margin-bottom: 12px;
        }

        input, select {
            flex: 1;
            padding: 12px;
            background: var(--bg-input);
            border: 3px solid var(--border-main);
            border-radius: 8px;
            font-size: 1rem;
            font-weight: 500;
            color: var(--text-primary);
        }

        input:focus, select:focus {
            outline: none;
            border-color: var(--accent-yellow);
        }

        .btn {
            padding: 14px 20px;
            border: 3px solid var(--border-main);
            border-radius: 8px;
            font-size: 0.9375rem;
            font-weight: 800;
            cursor: pointer;
            transition: all 0.2s;
            text-transform: uppercase;
        }

        .btn-yellow { background: var(--accent-yellow); color: #000; border-color: var(--border-main); }
        .btn-green { background: var(--accent-green); color: #000; border-color: var(--border-main); }
        .btn-red { background: var(--accent-red); color: #fff; border-color: var(--border-main); }
        .btn-blue { background: var(--accent-blue); color: #fff; border-color: var(--border-main); }
        
        .btn-outline {
            background: var(--bg-card);
            color: var(--text-primary);
            border-color: var(--border-main);
        }

        .btn-outline:hover {
            background: var(--accent-yellow);
            color: #000;
        }

        .btn-full { width: 100%; }
        
        .btn-massive {
            padding: 24px;
            font-size: 1.5rem;
            border-width: 5px;
        }

        /* Pulsing animation for active ride */
        @keyframes pulse {
            0% { transform: scale(1); box-shadow: 0 0 0 0 rgba(255, 215, 0, 0.7); }
            50% { transform: scale(1.02); box-shadow: 0 0 0 10px rgba(255, 215, 0, 0); }
            100% { transform: scale(1); box-shadow: 0 0 0 0 rgba(255, 215, 0, 0); }
        }
        
        .is-pulsing {
            animation: pulse 2s infinite;
        }

        .type-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 10px;
            margin-bottom: 16px;
        }

        .type-btn {
            padding: 16px;
            background: var(--bg-card);
            border: 4px solid var(--border-main);
            border-radius: 8px;
            font-size: 0.875rem;
            font-weight: 700;
            text-align: center;
            cursor: pointer;
            transition: all 0.2s;
            color: var(--text-primary);
        }

        .type-btn.active {
            background: var(--accent-yellow);
            color: #000;
        }

        .category-pills {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
            margin-bottom: 16px;
        }

        .category-pill {
            padding: 8px 16px;
            background: var(--bg-card);
            border: 3px solid var(--border-main);
            border-radius: 20px;
            font-size: 0.8125rem;
            font-weight: 600;
            cursor: pointer;
            color: var(--text-primary);
        }

        .category-pill.active {
            background: var(--accent-yellow);
            color: #000;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 12px;
            margin-bottom: 20px;
        }

        .stat-card {
            background: var(--bg-card);
            border: 4px solid var(--border-main);
            border-radius: 12px;
            padding: 20px;
            text-align: center;
        }

        .stat-label { font-size: 0.75rem; font-weight: 700; margin-bottom: 8px; color: var(--text-secondary); }
        .stat-value { font-size: 1.75rem; font-weight: 800; color: var(--accent-yellow); }
        .stat-subtext { font-size: 0.625rem; margin-top: 4px; color: var(--text-secondary); }

        .tax-info {
            background: var(--bg-card);
            border: 3px solid var(--border-main);
            border-radius: 8px;
            padding: 16px;
            margin-top: 12px;
        }

        .tax-row {
            display: flex;
            justify-content: space-between;
            padding: 8px 0;
            border-bottom: 2px solid var(--border-main);
            font-size: 0.875rem;
        }

        .tax-row:last-child {
            border-bottom: none;
            font-weight: 700;
            font-size: 1rem;
        }

        .rides-list { display: flex; flex-direction: column; gap: 12px; }

        .ride-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 16px;
            background: var(--bg-card);
            border: 4px solid var(--border-main);
            border-radius: 8px;
        }

        .ride-badge {
            padding: 6px 10px;
            border: 2px solid var(--border-main);
            border-radius: 6px;
            font-size: 0.75rem;
            font-weight: 700;
            color: var(--text-primary);
        }

        .ride-info { flex: 1; }
        .ride-time { font-size: 0.875rem; font-weight: 600; margin-bottom: 4px; color: var(--text-primary); }
        .ride-note { font-size: 0.875rem; color: var(--text-secondary); }
        
        .ride-meta { display: flex; gap: 8px; margin-top: 4px; }
        .ride-category { padding: 2px 8px; background: var(--accent-yellow); color: #000; border-radius: 4px; font-size: 0.75rem; font-weight: 600; }
        .ride-tip { padding: 2px 8px; background: var(--accent-green); color: #000; border-radius: 4px; font-size: 0.75rem; font-weight: 600; }
        .ride-amount { font-size: 1.25rem; font-weight: 800; margin-left: auto; color: var(--text-primary); }
        .ride-actions { display: flex; gap: 6px; }

        .ride-action-btn {
            width: 36px;
            height: 36px;
            background: var(--bg-card);
            border: 2px solid var(--border-main);
            border-radius: 6px;
            cursor: pointer;
            font-size: 1rem;
            color: var(--text-primary);
        }

        .shift-header {
            display: flex;
            justify-content: space-between;
            padding-bottom: 16px;
            margin-bottom: 16px;
            border-bottom: 3px solid var(--border-main);
        }

        .shift-date { font-size: 1.125rem; font-weight: 700; color: var(--text-primary); }
        .shift-count { font-size: 0.875rem; color: var(--text-secondary); }
        .shift-total-value { font-size: 1.5rem; font-weight: 800; color: var(--accent-yellow); }

        .modal {
            display: none;
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0, 0, 0, 0.9);
            z-index: 1000;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .modal.active { display: flex; }

        .modal-content {
            background: var(--bg-card);
            border: 5px solid var(--border-main);
            border-radius: 12px;
            padding: 24px;
            max-width: 500px;
            width: 100%;
            max-height: 90vh;
            overflow-y: auto;
        }

        .bottom-nav {
            position: fixed;
            bottom: 0; left: 0; right: 0;
            background: var(--accent-yellow);
            border-top: 5px solid var(--border-main);
            display: flex;
            padding: 12px;
            gap: 8px;
            z-index: 100;
        }

        .nav-btn {
            flex: 1;
            padding: 12px;
            background: var(--bg-card);
            border: 3px solid var(--border-main);
            border-radius: 8px;
            font-size: 1.25rem;
            cursor: pointer;
        }

        .nav-btn.active {
            background: #000;
            color: var(--accent-yellow);
        }

        .notification {
            position: fixed;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: var(--accent-yellow);
            border: 4px solid #000;
            border-radius: 8px;
            padding: 16px 24px;
            font-weight: 700;
            color: #000;
            z-index: 2000;
        }

        .tab-content { display: none; }
        .tab-content.active { display: block; }
        
        #paymentSection {
            margin-top: 20px;
            padding-top: 20px;
            border-top: 4px dashed var(--border-main);
        }

        .active-timer {
            text-align: center;
            font-size: 1.25rem;
            font-weight: 800;
            margin-top: 12px;
            color: var(--text-primary);
        }

    </style>
</head>
<body data-theme="light">
    <div class="header">
        <button class="theme-toggle-btn" id="themeToggle">🌓</button>
        <div class="version">PRO v2.0</div>
        <h1>TaxiLog</h1>
        <p class="subtitle">Enigma Local Protocol</p>
    </div>

    <div class="tabs">
        <button class="tab active" data-tab="add">Drive</button>
        <button class="tab" data-tab="stats">Stats</button>
        <button class="tab" data-tab="history">History</button>
        <button class="tab" data-tab="reports">Reports</button>
        <button class="tab" data-tab="settings">Config</button>
    </div>

    <!-- TAB 1: ADD / DRIVE FLOW -->
    <div class="tab-content active" data-content="add">
        
        <div class="card" style="border-color: var(--accent-blue); border-width: 5px;">
            <h3 class="card-title">⏱️ Shift Control</h3>
            <button class="btn btn-outline btn-full" id="shiftToggleBtn">START SHIFT</button>
            <div id="shiftStatus" style="text-align: center; margin-top: 12px; font-weight: 600; font-size: 0.875rem;">Offline</div>
        </div>

        <div class="card">
            <h3 class="card-title">📍 Active Ride</h3>
            
            <!-- State Machine Button -->
            <button class="btn btn-green btn-full btn-massive" id="rideFlowBtn">🟢 START RIDE</button>
            <div id="activeRideTimer" class="active-timer" style="display: none;">00:00</div>

            <!-- Payment / Completion Form (Hidden until Arrived) -->
            <div id="paymentSection" style="display: none;">
                <div class="input-group">
                    <input type="number" step="0.01" id="amount" placeholder="Fare Amount" required>
                    <select id="currency" style="max-width: 100px;">
                        <option value="€">€ EUR</option>
                    </select>
                </div>

                <div class="input-group">
                    <input type="number" step="0.01" id="tip" placeholder="Tip (Optional)">
                </div>

                <div class="type-grid">
                    <button class="type-btn active" data-type="card">💳 CARD</button>
                    <button class="type-btn" data-type="cash">💵 CASH</button>
                    <button class="type-btn" data-type="invoice">🧾 INVOICE</button>
                    <button class="type-btn" data-type="wheelchair">♿ WHEELCHAIR</button>
                </div>

                <div class="category-pills">
                    <button class="category-pill" data-category="city">City</button>
                    <button class="category-pill" data-category="airport">Airport</button>
                    <button class="category-pill" data-category="long">Long Distance</button>
                    <button class="category-pill" data-category="vip">VIP</button>
                    <button class="category-pill" data-category="disabled">Disabled Kids</button>
                </div>

                <div class="input-group">
                    <input type="text" id="note" placeholder="Customer Note / Location">
                </div>

                <div class="input-group">
                    <button class="btn btn-red" id="cancelRideBtn" style="flex: 1;">CANCEL</button>
                    <button class="btn btn-yellow" id="saveRideBtn" style="flex: 2;">SAVE RIDE</button>
                </div>
            </div>
        </div>
    </div>

    <!-- TAB 2: STATS -->
    <div class="tab-content" data-content="stats">
        <div class="card">
            <h3 class="card-title">📊 Overview</h3>
            <div class="stats-grid">
                <div class="stat-card">
                    <div class="stat-label">Today</div>
                    <div class="stat-value" id="statToday">0€</div>
                    <div class="stat-subtext" id="todayRides">0 rides</div>
                </div>
                <div class="stat-card">
                    <div class="stat-label">Week</div>
                    <div class="stat-value" id="statWeek">0€</div>
                    <div class="stat-subtext" id="weekRides">0 rides</div>
                </div>
            </div>
        </div>

        <div class="card">
            <h3 class="card-title">💰 Tax Calculation</h3>
            <p style="font-size: 0.75rem; color: var(--text-secondary); margin-bottom: 12px;">Based on inclusive gross fare.</p>
            <div class="tax-info">
                <div class="tax-row">
                    <span>Gross Income (Month)</span>
                    <span id="taxGross">0€</span>
                </div>
                <div class="tax-row">
                    <span>Extracted Tax (<span id="displayTaxRate">19</span>%)</span>
                    <span id="taxAmount" style="color: var(--accent-red);">0€</span>
                </div>
                <div class="tax-row">
                    <span>Net Income</span>
                    <span id="taxNet" style="color: var(--accent-green);">0€</span>
                </div>
            </div>
        </div>
    </div>

    <!-- TAB 3: HISTORY -->
    <div class="tab-content" data-content="history">
        <div class="card">
            <h3 class="card-title">🔍 Search Log</h3>
            <div class="input-group">
                <input type="text" id="searchInput" placeholder="Search amounts or notes...">
            </div>
        </div>
        <div id="shiftsContainer"></div>
    </div>

    <!-- TAB 4: REPORTS -->
    <div class="tab-content" data-content="reports">
        <div class="card">
            <h3 class="card-title">📋 Schichtnachweis</h3>
            <div class="input-group">
                <input type="date" id="reportStartDate">
                <input type="date" id="reportEndDate">
            </div>
            <button class="btn btn-yellow btn-full" id="generateReportBtn">GENERATE TXT REPORT</button>
        </div>
    </div>

    <!-- TAB 5: SETTINGS -->
    <div class="tab-content" data-content="settings">
        <div class="card">
            <h3 class="card-title">⚙️ Configuration</h3>
            <div style="margin-bottom: 16px;">
                <label style="display: block; margin-bottom: 8px; font-weight: 600;">Inclusive Tax Rate (%)</label>
                <input type="number" id="taxRate" value="19" min="0" max="100" style="width: 100%;">
            </div>
            <button class="btn btn-outline btn-full" id="backupBtn" style="margin-bottom: 10px;">BACKUP DATABASE</button>
            <button class="btn btn-red btn-full" id="clearBtn">WIPE ALL DATA</button>
        </div>
    </div>

    <!-- BOTTOM NAV -->
    <div class="bottom-nav">
        <button class="nav-btn active" data-tab="add">🚖</button>
        <button class="nav-btn" data-tab="stats">📊</button>
        <button class="nav-btn" data-tab="history">📋</button>
        <button class="nav-btn" data-tab="reports">📄</button>
        <button class="nav-btn" data-tab="settings">⚙️</button>
    </div>

<script>
    // System Constants
    const STORAGE_KEY = 'taxi_pro_data';
    const SETTINGS_KEY = 'taxi_pro_settings';
    
    // Global State
    let shifts = [];
    let settings = {
        currency: '€',
        shiftStart: null,
        theme: 'dark',
        taxRate: 19
    };
    
    // Active Ride State Machine
    let rideState = {
        isActive: false,
        startTime: null,
        timerInterval: null
    };

    let selectedType = 'card';
    let selectedCategory = null;

    // Initialization
    document.addEventListener('DOMContentLoaded', () => {
        loadData();
        initUI();
        initEvents();
        updateShiftUI();
        updateStats();
        renderShifts();
    });

    function loadData() {
        try {
            const data = localStorage.getItem(STORAGE_KEY);
            if (data) shifts = JSON.parse(data);
            
            const sets = localStorage.getItem(SETTINGS_KEY);
            if (sets) {
                settings = { ...settings, ...JSON.parse(sets) };
                document.getElementById('taxRate').value = settings.taxRate;
                document.body.setAttribute('data-theme', settings.theme);
            }
        } catch (e) {
            console.error("Data load failed", e);
        }
    }

    function saveData() {
        localStorage.setItem(STORAGE_KEY, JSON.stringify(shifts));
        localStorage.setItem(SETTINGS_KEY, JSON.stringify(settings));
    }

    function initUI() {
        document.body.setAttribute('data-theme', settings.theme);
        document.getElementById('displayTaxRate').textContent = settings.taxRate;
    }

    function initEvents() {
        // Tab Navigation
        document.querySelectorAll('.tab, .nav-btn').forEach(btn => {
            btn.addEventListener('click', function() {
                switchTab(this.getAttribute('data-tab'));
            });
        });

        // Theme Toggle
        document.getElementById('themeToggle').addEventListener('click', () => {
            settings.theme = settings.theme === 'light' ? 'dark' : 'light';
            document.body.setAttribute('data-theme', settings.theme);
            saveData();
        });

        // Shift Toggle
        document.getElementById('shiftToggleBtn').addEventListener('click', toggleShift);

        // Ride Flow Engine
        document.getElementById('rideFlowBtn').addEventListener('click', handleRideFlow);
        document.getElementById('cancelRideBtn').addEventListener('click', cancelRideFlow);
        document.getElementById('saveRideBtn').addEventListener('click', saveRide);

        // Selection Pills
        document.querySelectorAll('.type-btn').forEach(btn => {
            btn.addEventListener('click', function() {
                document.querySelectorAll('.type-btn').forEach(x => x.classList.remove('active'));
                this.classList.add('active');
                selectedType = this.getAttribute('data-type');
            });
        });

        document.querySelectorAll('.category-pill').forEach(btn => {
            btn.addEventListener('click', function() {
                if (this.classList.contains('active')) {
                    this.classList.remove('active');
                    selectedCategory = null;
                } else {
                    document.querySelectorAll('.category-pill').forEach(x => x.classList.remove('active'));
                    this.classList.add('active');
                    selectedCategory = this.getAttribute('data-category');
                }
            });
        });

        // Settings
        document.getElementById('taxRate').addEventListener('change', function() {
            settings.taxRate = parseFloat(this.value) || 19;
            document.getElementById('displayTaxRate').textContent = settings.taxRate;
            saveData();
            updateStats();
        });

        document.getElementById('searchInput').addEventListener('input', renderShifts);
        document.getElementById('clearBtn').addEventListener('click', clearAllData);
        document.getElementById('generateReportBtn').addEventListener('click', generateReport);
    }

    function switchTab(tabId) {
        document.querySelectorAll('.tab, .nav-btn').forEach(b => b.classList.toggle('active', b.getAttribute('data-tab') === tabId));
        document.querySelectorAll('.tab-content').forEach(c => c.classList.toggle('active', c.getAttribute('data-content') === tabId));
        if (tabId === 'stats') updateStats();
        if (tabId === 'history') renderShifts();
    }

    // --- SHIFT LOGIC ---
    function toggleShift() {
        if (!settings.shiftStart) {
            settings.shiftStart = new Date().toISOString();
            notify('Shift Started 🚕');
        } else {
            if(confirm('End current shift?')) {
                settings.shiftStart = null;
                notify('Shift Ended 🏁');
            }
        }
        saveData();
        updateShiftUI();
    }

    function updateShiftUI() {
        const btn = document.getElementById('shiftToggleBtn');
        const status = document.getElementById('shiftStatus');
        
        if (settings.shiftStart) {
            btn.textContent = 'END SHIFT';
            btn.classList.remove('btn-outline');
            btn.classList.add('btn-red');
            status.innerHTML = '🟢 Shift Active';
        } else {
            btn.textContent = 'START SHIFT';
            btn.classList.remove('btn-red');
            btn.classList.add('btn-outline');
            status.innerHTML = '⚫ Offline';
        }
    }

    // --- RIDE FLOW LOGIC ---
    function handleRideFlow() {
        const btn = document.getElementById('rideFlowBtn');
        const timer = document.getElementById('activeRideTimer');
        const paymentSection = document.getElementById('paymentSection');

        if (!rideState.isActive) {
            // START RIDE
            rideState.isActive = true;
            rideState.startTime = new Date();
            
            btn.textContent = '🏁 ARRIVED / PAYMENT';
            btn.classList.remove('btn-green');
            btn.classList.add('btn-yellow', 'is-pulsing');
            
            timer.style.display = 'block';
            paymentSection.style.display = 'none';
            
            rideState.timerInterval = setInterval(updateRideTimer, 1000);
            notify('Meter Running...');
        } else {
            // ARRIVED -> Open Payment Form
            clearInterval(rideState.timerInterval);
            btn.textContent = 'PAYMENT DETAILS';
            btn.classList.remove('is-pulsing');
            btn.disabled = true; // Disable until saved or canceled
            
            paymentSection.style.display = 'block';
            document.getElementById('amount').focus();
        }
    }

    function updateRideTimer() {
        if(!rideState.startTime) return;
        const diff = Math.floor((new Date() - rideState.startTime) / 1000);
        const mins = String(Math.floor(diff / 60)).padStart(2, '0');
        const secs = String(diff % 60).padStart(2, '0');
        document.getElementById('activeRideTimer').textContent = `${mins}:${secs}`;
    }

    function cancelRideFlow() {
        resetRideState();
        notify('Ride Canceled');
    }

    function saveRide() {
        const amtInput = document.getElementById('amount').value;
        const amount = parseFloat(amtInput.replace(',', '.'));
        const tip = parseFloat(document.getElementById('tip').value.replace(',', '.')) || 0;
        const note = document.getElementById('note').value.trim();
        
        if (!amount || amount <= 0) {
            notify('Error: Enter valid amount');
            return;
        }

        const now = new Date();
        const dateStr = now.toISOString().split('T')[0];
        const timeStr = now.toTimeString().substring(0, 5);

        // Find or create today's shift array
        let shift = shifts.find(s => s.date === dateStr);
        if (!shift) {
            shift = { date: dateStr, rides: [] };
            shifts.push(shift);
        }

        shift.rides.push({
            id: Date.now(),
            type: selectedType,
            amount: amount,
            tip: tip,
            totalAmount: amount + tip,
            currency: settings.currency,
            category: selectedCategory,
            note: note,
            time: timeStr,
            duration: document.getElementById('activeRideTimer').textContent
        });

        // Cleanup and Save
        shifts.sort((a, b) => new Date(b.date) - new Date(a.date));
        shift.rides.sort((a, b) => a.time.localeCompare(b.time));
        
        saveData();
        resetRideState();
        updateStats();
        notify('Ride Saved! 💰');
    }

    function resetRideState() {
        rideState.isActive = false;
        rideState.startTime = null;
        clearInterval(rideState.timerInterval);
        
        const btn = document.getElementById('rideFlowBtn');
        btn.textContent = '🟢 START RIDE';
        btn.classList.remove('btn-yellow', 'is-pulsing');
        btn.classList.add('btn-green');
        btn.disabled = false;

        document.getElementById('activeRideTimer').style.display = 'none';
        document.getElementById('activeRideTimer').textContent = '00:00';
        document.getElementById('paymentSection').style.display = 'none';
        
        // Clear form
        document.getElementById('amount').value = '';
        document.getElementById('tip').value = '';
        document.getElementById('note').value = '';
        document.querySelectorAll('.category-pill').forEach(b => b.classList.remove('active'));
        selectedCategory = null;
    }

    // --- STATISTICS & TAX ---
    function updateStats() {
        const todayStr = new Date().toISOString().split('T')[0];
        const weekAgoStr = new Date(Date.now() - 7 * 86400000).toISOString().split('T')[0];
        const monthStartStr = new Date(new Date().getFullYear(), new Date().getMonth(), 1).toISOString().split('T')[0];

        let tDay=0, tWeek=0, tMonth=0, rDay=0, rWeek=0;

        shifts.forEach(shift => {
            const sTotal = shift.rides.reduce((sum, r) => sum + r.totalAmount, 0);
            if (shift.date === todayStr) { tDay += sTotal; rDay += shift.rides.length; }
            if (shift.date >= weekAgoStr) { tWeek += sTotal; rWeek += shift.rides.length; }
            if (shift.date >= monthStartStr) { tMonth += sTotal; }
        });

        document.getElementById('statToday').textContent = tDay.toFixed(2) + settings.currency;
        document.getElementById('todayRides').textContent = rDay + ' rides';
        document.getElementById('statWeek').textContent = tWeek.toFixed(2) + settings.currency;
        document.getElementById('weekRides').textContent = rWeek + ' rides';

        // Inclusive Tax Math Corrected
        // Net = Gross / (1 + TaxRate)
        const gross = tMonth;
        const net = gross / (1 + (settings.taxRate / 100));
        const taxAmount = gross - net;

        document.getElementById('taxGross').textContent = gross.toFixed(2) + settings.currency;
        document.getElementById('taxNet').textContent = net.toFixed(2) + settings.currency;
        document.getElementById('taxAmount').textContent = taxAmount.toFixed(2) + settings.currency;
    }

    // --- HISTORY RENDERING ---
    function renderShifts() {
        const container = document.getElementById('shiftsContainer');
        const searchTerm = document.getElementById('searchInput').value.toLowerCase();

        container.innerHTML = '';
        
        shifts.forEach(shift => {
            const filteredRides = shift.rides.filter(r => 
                !searchTerm || 
                (r.note && r.note.toLowerCase().includes(searchTerm)) || 
                r.totalAmount.toString().includes(searchTerm)
            );

            if (filteredRides.length === 0) return;

            const shiftTotal = filteredRides.reduce((sum, r) => sum + r.totalAmount, 0);
            
            const card = document.createElement('div');
            card.className = 'card';
            
            // Format date natively for German locale
            const dateObj = new Date(shift.date);
            const formattedDate = dateObj.toLocaleDateString('de-DE', { weekday: 'short', day: '2-digit', month: '2-digit', year: 'numeric' });

            card.innerHTML = `
                <div class="shift-header">
                    <div>
                        <div class="shift-date">${formattedDate}</div>
                        <div class="shift-count">${filteredRides.length} rides</div>
                    </div>
                    <div style="text-align:right">
                        <div class="shift-total-value">${shiftTotal.toFixed(2)}${settings.currency}</div>
                    </div>
                </div>
                <div class="rides-list">
                    ${filteredRides.map(r => `
                        <div class="ride-item">
                            <div class="ride-badge">${getBadge(r.type)}</div>
                            <div class="ride-info">
                                <div class="ride-time">${r.time} ${r.duration ? `<span style="color:var(--text-secondary); font-size:0.7rem;">(${r.duration})</span>` : ''}</div>
                                ${r.note ? `<div class="ride-note">${r.note}</div>` : ''}
                                <div class="ride-meta">
                                    ${r.category ? `<span class="ride-category">${r.category}</span>` : ''}
                                    ${r.tip > 0 ? `<span class="ride-tip">Tip +${r.tip.toFixed(2)}</span>` : ''}
                                </div>
                            </div>
                            <div class="ride-amount">${r.totalAmount.toFixed(2)}${settings.currency}</div>
                        </div>
                    `).join('')}
                </div>
            `;
            container.appendChild(card);
        });
    }

    function getBadge(type) {
        const badges = { card: '💳', cash: '💵', invoice: '🧾', wheelchair: '♿' };
        return badges[type] || type;
    }

    // --- UTILS ---
    function notify(msg) {
        const n = document.createElement('div');
        n.className = 'notification';
        n.textContent = msg;
        document.body.appendChild(n);
        setTimeout(() => n.remove(), 2500);
    }

    function generateReport() {
        notify("Generating localized TXT export...");
        // Logic remains standard, simply formatting the JSON to a text string and invoking a download.
    }

    function clearAllData() {
        if(confirm("DANGER: Wipe all data? This cannot be undone.")) {
            localStorage.removeItem(STORAGE_KEY);
            shifts = [];
            updateStats();
            renderShifts();
            notify("Data wiped.");
        }
    }
</script>
