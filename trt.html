    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
    }

    :root {
        --bg-dark: #0a0e1a;
        --bg-card: #141824;
        --accent-yellow: #ffd93d;
        --accent-green: #6bcf7f;
        --accent-blue: #4a9eff;
        --accent-red: #ff6b6b;
        --text-primary: #e8edf4;
        --text-secondary: #8b95a8;
        --border: #1e2433;
    }

    body {
        font-family: 'JetBrains Mono', monospace;
        background: linear-gradient(135deg, var(--bg-dark) 0%, #0f1419 100%);
        color: var(--text-primary);
        min-height: 100vh;
        padding: 20px;
        position: relative;
        overflow-x: hidden;
    }

    body::before {
        content: '';
        position: fixed;
        top: 0;
        left: 0;
        right: 0;
        bottom: 0;
        background: 
            radial-gradient(circle at 20% 30%, rgba(255, 217, 61, 0.05) 0%, transparent 50%),
            radial-gradient(circle at 80% 70%, rgba(74, 158, 255, 0.05) 0%, transparent 50%);
        pointer-events: none;
        z-index: 0;
    }

    .container {
        max-width: 600px;
        margin: 0 auto;
        position: relative;
        z-index: 1;
    }

    .header {
        text-align: center;
        margin-bottom: 30px;
        animation: slideDown 0.6s cubic-bezier(0.34, 1.56, 0.64, 1);
    }

    @keyframes slideDown {
        from {
            opacity: 0;
            transform: translateY(-30px);
        }
        to {
            opacity: 1;
            transform: translateY(0);
        }
    }

    .header h1 {
        font-family: 'Space Mono', monospace;
        font-size: 2rem;
        font-weight: 700;
        margin-bottom: 8px;
        background: linear-gradient(135deg, var(--accent-yellow) 0%, var(--accent-green) 100%);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
        text-transform: uppercase;
        letter-spacing: 2px;
    }

    .header p {
        color: var(--text-secondary);
        font-size: 0.85rem;
        font-weight: 300;
    }

    .quick-add {
        background: var(--bg-card);
        border: 1px solid var(--border);
        border-radius: 16px;
        padding: 20px;
        margin-bottom: 20px;
        animation: fadeIn 0.6s ease 0.2s backwards;
    }

    @keyframes fadeIn {
        from {
            opacity: 0;
            transform: translateY(20px);
        }
        to {
            opacity: 1;
            transform: translateY(0);
        }
    }

    .quick-add h3 {
        font-size: 0.9rem;
        text-transform: uppercase;
        letter-spacing: 1.5px;
        margin-bottom: 15px;
        color: var(--text-secondary);
        font-weight: 500;
    }

    .input-row {
        display: flex;
        gap: 10px;
        margin-bottom: 15px;
    }

    input[type="number"], 
    input[type="text"], 
    input[type="time"], 
    input[type="date"] {
        flex: 1;
        background: rgba(255, 255, 255, 0.03);
        border: 1px solid var(--border);
        border-radius: 8px;
        padding: 12px;
        color: var(--text-primary);
        font-family: 'JetBrains Mono', monospace;
        font-size: 0.9rem;
        transition: all 0.3s ease;
    }

    input:focus {
        outline: none;
        border-color: var(--accent-yellow);
        background: rgba(255, 217, 61, 0.05);
    }

    input::placeholder {
        color: var(--text-secondary);
        opacity: 0.5;
    }

    .now-btn {
        background: rgba(107, 207, 127, 0.1);
        border: 2px solid var(--accent-green);
        border-radius: 8px;
        padding: 12px 20px;
        color: var(--accent-green);
        font-family: 'JetBrains Mono', monospace;
        font-size: 0.85rem;
        font-weight: 700;
        cursor: pointer;
        text-transform: uppercase;
        letter-spacing: 1px;
        transition: all 0.3s ease;
        white-space: nowrap;
    }

    .now-btn:hover {
        background: var(--accent-green);
        color: var(--bg-dark);
        transform: scale(1.05);
    }

    .type-selector {
        display: grid;
        grid-template-columns: repeat(2, 1fr);
        gap: 8px;
        margin-bottom: 15px;
    }

    .type-btn {
        background: rgba(255, 255, 255, 0.03);
        border: 2px solid var(--border);
        border-radius: 8px;
        padding: 12px;
        color: var(--text-secondary);
        font-family: 'JetBrains Mono', monospace;
        font-size: 0.8rem;
        font-weight: 500;
        cursor: pointer;
        transition: all 0.3s ease;
        text-transform: uppercase;
        letter-spacing: 1px;
    }

    .type-btn:hover {
        transform: translateY(-2px);
    }

    .type-btn.active {
        border-color: currentColor;
        background: currentColor;
        color: #0a0e1a;
        font-weight: 700;
    }

    .type-btn[data-type="card"] { color: var(--accent-yellow); }
    .type-btn[data-type="cash"] { color: var(--accent-green); }
    .type-btn[data-type="invoice"] { color: var(--accent-red); }
    .type-btn[data-type="wheelchair"] { color: var(--accent-blue); }

    .add-btn {
        width: 100%;
        background: linear-gradient(135deg, var(--accent-yellow) 0%, var(--accent-green) 100%);
        border: none;
        border-radius: 8px;
        padding: 14px;
        color: var(--bg-dark);
        font-family: 'Space Mono', monospace;
        font-size: 0.9rem;
        font-weight: 700;
        cursor: pointer;
        text-transform: uppercase;
        letter-spacing: 2px;
        transition: all 0.3s ease;
    }

    .add-btn:hover {
        transform: translateY(-2px);
        box-shadow: 0 10px 30px rgba(255, 217, 61, 0.3);
    }

    .add-btn:active {
        transform: translateY(0);
    }

    .shift-section {
        background: var(--bg-card);
        border: 1px solid var(--border);
        border-radius: 16px;
        padding: 20px;
        margin-bottom: 20px;
        animation: fadeIn 0.6s ease 0.3s backwards;
    }

    .shift-header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 15px;
        padding-bottom: 15px;
        border-bottom: 1px solid var(--border);
        flex-wrap: wrap;
        gap: 10px;
    }

    .shift-date {
        font-family: 'Space Mono', monospace;
        font-size: 1.2rem;
        font-weight: 700;
        color: var(--accent-yellow);
    }

    .shift-time {
        font-size: 0.85rem;
        color: var(--text-secondary);
    }

    .shift-total {
        text-align: right;
    }

    .total-label {
        font-size: 0.75rem;
        color: var(--text-secondary);
        text-transform: uppercase;
        letter-spacing: 1px;
    }

    .total-amount {
        font-family: 'Space Mono', monospace;
        font-size: 1.5rem;
        font-weight: 700;
        color: var(--accent-green);
    }

    .rides-list {
        display: flex;
        flex-direction: column;
        gap: 8px;
    }

    .ride-item {
        display: flex;
        align-items: center;
        gap: 12px;
        background: rgba(255, 255, 255, 0.02);
        border-left: 3px solid;
        border-radius: 8px;
        padding: 12px;
        transition: all 0.3s ease;
        animation: slideIn 0.4s ease backwards;
    }

    @keyframes slideIn {
        from {
            opacity: 0;
            transform: translateX(-20px);
        }
        to {
            opacity: 1;
            transform: translateX(0);
        }
    }

    .ride-item:hover {
        background: rgba(255, 255, 255, 0.05);
        transform: translateX(5px);
    }

    .ride-item[data-type="card"] { border-left-color: var(--accent-yellow); }
    .ride-item[data-type="cash"] { border-left-color: var(--accent-green); }
    .ride-item[data-type="invoice"] { border-left-color: var(--accent-red); }
    .ride-item[data-type="wheelchair"] { border-left-color: var(--accent-blue); }

    .ride-type-badge {
        padding: 4px 10px;
        border-radius: 6px;
        font-size: 0.7rem;
        font-weight: 700;
        text-transform: uppercase;
        letter-spacing: 1px;
        white-space: nowrap;
    }

    .ride-item[data-type="card"] .ride-type-badge {
        background: rgba(255, 217, 61, 0.15);
        color: var(--accent-yellow);
    }

    .ride-item[data-type="cash"] .ride-type-badge {
        background: rgba(107, 207, 127, 0.15);
        color: var(--accent-green);
    }

    .ride-item[data-type="invoice"] .ride-type-badge {
        background: rgba(255, 107, 107, 0.15);
        color: var(--accent-red);
    }

    .ride-item[data-type="wheelchair"] .ride-type-badge {
        background: rgba(74, 158, 255, 0.15);
        color: var(--accent-blue);
    }

    .ride-details {
        flex: 1;
        display: flex;
        gap: 8px;
        align-items: center;
        font-size: 0.85rem;
        flex-wrap: wrap;
        min-width: 0;
    }

    .ride-note {
        color: var(--text-secondary);
        font-style: italic;
        overflow: hidden;
        text-overflow: ellipsis;
    }

    .ride-tip {
        background: rgba(107, 207, 127, 0.15);
        color: var(--accent-green);
        padding: 2px 8px;
        border-radius: 4px;
        font-size: 0.75rem;
        font-weight: 700;
        white-space: nowrap;
    }

    .ride-amount {
        font-family: 'Space Mono', monospace;
        font-size: 1.1rem;
        font-weight: 700;
        color: var(--text-primary);
        margin-left: auto;
    }

    .delete-btn {
        background: rgba(255, 107, 107, 0.1);
        border: 1px solid rgba(255, 107, 107, 0.3);
        border-radius: 6px;
        padding: 6px 10px;
        color: var(--accent-red);
        font-size: 0.75rem;
        cursor: pointer;
        transition: all 0.3s ease;
    }

    .delete-btn:hover {
        background: rgba(255, 107, 107, 0.2);
        transform: scale(1.05);
    }

    .export-section {
        display: flex;
        gap: 10px;
        margin-top: 20px;
        animation: fadeIn 0.6s ease 0.4s backwards;
    }

    .export-btn {
        flex: 1;
        background: rgba(74, 158, 255, 0.1);
        border: 2px solid var(--accent-blue);

        padding: 14px;
        color: var(--accent-blue);
        font-family: 'Space Mono', monospace;
        font-size: 0.85rem;

        cursor: pointer;
        text-transform: uppercase;

        transition: all 0.3s ease;

        color: var(--bg-dark);

    @media (max-width: 600px) {
        .header h1 {
            font-size: 1.5rem;
        }
        
        .type-selector {
            grid-template-columns: 1fr;
        }
    }

    <div class="quick-add">
        <h3>Neue Fahrt</h3>
        
        <div class="input-row">
            <input type="date" id="rideDate">
            <input type="time" id="rideTime">
            <button class="now-btn" id="nowBtn">Jetzt</button>
        </div>

        <div class="input-row">
            <input type="number" step="0.01" id="amount" placeholder="Betrag (€)" min="0">
            <input type="number" step="0.01" id="tip" placeholder="Trinkgeld (€)" min="0">
        </div>

        <div class="input-row">
            <input type="text" id="note" placeholder="Notiz (optional)">
        </div>

        <div class="type-selector">
            <button class="type-btn active" data-type="card">💳 Karte</button>
            <button class="type-btn" data-type="cash">💵 Bar</button>
            <button class="type-btn" data-type="invoice">🧾 Rechnung</button>
            <button class="type-btn" data-type="wheelchair">♿ Rollstuhl</button>
        </div>

        <button class="add-btn" id="addBtn">+ Fahrt hinzufügen</button>
    </div>

    <div id="shiftsContainer"></div>

    <div class="export-section">
        <button class="export-btn" id="exportBtn">📊 Export</button>
        <button class="export-btn clear-btn" id="clearBtn">🗑️ Löschen</button>
    </div>
</div>

<script>
    document.addEventListener('DOMContentLoaded', function() {
        const STORAGE_KEY = 'taxi_shifts';
        let selectedType = 'card';
        let shifts = [];

        // Load data
        function loadData() {
        try {
            const stored = localStorage.getItem(STORAGE_KEY);
            if (stored) {
                shifts = JSON.parse(stored);
            }
        } catch (e) {
            console.error('Load error:', e);
            shifts = [];
        }
        renderShifts();
    }

    // Save data
    function saveData() {
        try {
            localStorage.setItem(STORAGE_KEY, JSON.stringify(shifts));
        } catch (e) {
            console.error('Save error:', e);
            alert('Fehler beim Speichern!');
        }
    }

    // Type selector
    document.querySelectorAll('.type-btn').forEach(btn => {
        btn.addEventListener('click', function() {
            document.querySelectorAll('.type-btn').forEach(b => b.classList.remove('active'));
            this.classList.add('active');
            selectedType = this.getAttribute('data-type');
        });
    });

    // Now button
    document.getElementById('nowBtn').addEventListener('click', function() {
        const now = new Date();
        document.getElementById('rideDate').value = now.toISOString().split('T')[0];
        document.getElementById('rideTime').value = now.toTimeString().substring(0, 5);
    });

    // Add ride
    document.getElementById('addBtn').addEventListener('click', function() {
        const amount = parseFloat(document.getElementById('amount').value);
        const tip = parseFloat(document.getElementById('tip').value) || 0;
        const note = document.getElementById('note').value.trim();
        const rideDate = document.getElementById('rideDate').value;
        const rideTime = document.getElementById('rideTime').value;

        if (!amount || amount <= 0) {
            alert('Bitte gültigen Betrag eingeben');
            return;
        }

        if (!rideDate || !rideTime) {
            alert('Bitte Datum und Zeit auswählen');
            return;
        }

        let shift = shifts.find(s => s.date === rideDate);
        if (!shift) {
            shift = { date: rideDate, rides: [] };
            shifts.push(shift);
            shifts.sort((a, b) => new Date(b.date) - new Date(a.date));
        }

        shift.rides.push({
            id: Date.now(),
            type: selectedType,
            amount: amount,
            tip: tip,
            totalAmount: amount + tip,
            note: note,
            time: rideTime,
            timestamp: new Date(rideDate + 'T' + rideTime).toISOString()
        });

        shift.rides.sort((a, b) => a.time.localeCompare(b.time));

        saveData();
        renderShifts();

        document.getElementById('amount').value = '';
        document.getElementById('tip').value = '';
        document.getElementById('note').value = '';
    });

    // Render shifts
    function renderShifts() {
        const container = document.getElementById('shiftsContainer');
        
        if (shifts.length === 0) {
            container.innerHTML = `
                <div class="shift-section">
                    <div class="empty-state">
                        <div class="empty-state-icon">🚕</div>
                        <p>Keine Fahrten vorhanden.<br>Füge deine erste Fahrt hinzu!</p>
                    </div>
                </div>
            `;
            return;
        }

        let html = '';
        shifts.forEach((shift, shiftIndex) => {
            const total = shift.rides.reduce((sum, ride) => sum + ride.totalAmount, 0);
            const totalTips = shift.rides.reduce((sum, ride) => sum + (ride.tip || 0), 0);
            
            html += `
                <div class="shift-section">
                    <div class="shift-header">
                        <div>
                            <div class="shift-date">${formatDate(shift.date)}</div>
                            <div class="shift-time">${shift.rides.length} Fahrt${shift.rides.length !== 1 ? 'en' : ''}</div>
                        </div>
                        <div class="shift-total">
                            <div class="total-label">Gesamt${totalTips > 0 ? ' (inkl. Trinkgeld)' : ''}</div>
                            <div class="total-amount">${total.toFixed(2)}€</div>
                        </div>
                    </div>
                    <div class="rides-list">
            `;

            shift.rides.forEach((ride, rideIndex) => {
                html += `
                    <div class="ride-item" data-type="${ride.type}" style="animation-delay: ${rideIndex * 0.05}s">
                        <div class="ride-type-badge">${getTypeLabel(ride.type)}</div>
                        <div class="ride-details">
                            <span style="color: var(--text-secondary); font-size: 0.8rem;">${ride.time}</span>
                            ${ride.note ? `<span class="ride-note">${ride.note}</span>` : ''}
                            ${ride.tip > 0 ? `<span class="ride-tip">+${ride.tip.toFixed(2)}€ Tip</span>` : ''}
                        </div>
                        <div class="ride-amount">${ride.totalAmount.toFixed(2)}€</div>
                        <button class="delete-btn" data-shift="${shiftIndex}" data-ride="${rideIndex}">×</button>
                    </div>
                `;
            });

            html += `
                    </div>
                </div>
            `;
        });

        container.innerHTML = html;

        // Add delete listeners
        container.querySelectorAll('.delete-btn').forEach(btn => {
            btn.addEventListener('click', function() {
                const shiftIdx = parseInt(this.getAttribute('data-shift'));
                const rideIdx = parseInt(this.getAttribute('data-ride'));
                deleteRide(shiftIdx, rideIdx);
            });
        });
    }

    function formatDate(dateStr) {
        const date = new Date(dateStr + 'T00:00:00');
        const options = { weekday: 'short', day: '2-digit', month: '2-digit', year: 'numeric' };
        return date.toLocaleDateString('de-DE', options);
    }

    function getTypeLabel(type) {
        const labels = {
            card: '💳 Karte',
            cash: '💵 Bar',
            invoice: '🧾 Rechnung',
            wheelchair: '♿ Rollstuhl'
        };
        return labels[type] || type;
    }

    function deleteRide(shiftIndex, rideIndex) {
        if (confirm('Fahrt wirklich löschen?')) {
            shifts[shiftIndex].rides.splice(rideIndex, 1);
            if (shifts[shiftIndex].rides.length === 0) {
                shifts.splice(shiftIndex, 1);
            }
            saveData();
            renderShifts();
        }
    }

    // Export
    document.getElementById('exportBtn').addEventListener('click', function() {
        let report = '=== SCHICHT NACHWEIS ===\n\n';
        
        shifts.forEach(shift => {
            const total = shift.rides.reduce((sum, ride) => sum + ride.totalAmount, 0);
            const totalBase = shift.rides.reduce((sum, ride) => sum + ride.amount, 0);
            const totalTips = shift.rides.reduce((sum, ride) => sum + (ride.tip || 0), 0);
            
            report += `Datum: ${formatDate(shift.date)}\n`;
            report += `Fahrten: ${shift.rides.length}\n`;
            report += `Gesamt: ${total.toFixed(2)}€`;
            if (totalTips > 0) {
                report += ` (Fahrpreise: ${totalBase.toFixed(2)}€ + Trinkgeld: ${totalTips.toFixed(2)}€)`;
            }
            report += '\n\n';
            
            const byType = {
                card: { label: 'Karte', total: 0, tips: 0, count: 0 },
                cash: { label: 'Bar', total: 0, tips: 0, count: 0 },
                invoice: { label: 'Rechnung', total: 0, tips: 0, count: 0 },
                wheelchair: { label: 'Rollstuhl', total: 0, tips: 0, count: 0 }
            };
            
            shift.rides.forEach(ride => {
                byType[ride.type].total += ride.totalAmount;
                byType[ride.type].tips += (ride.tip || 0);
                byType[ride.type].count++;
                report += `  ${ride.time} | ${getTypeLabel(ride.type)}: ${ride.totalAmount.toFixed(2)}€`;
                if (ride.tip > 0) report += ` (Fahrt: ${ride.amount.toFixed(2)}€ + Tip: ${ride.tip.toFixed(2)}€)`;
                if (ride.note) report += ` - ${ride.note}`;
                report += '\n';
            });
            
            report += '\nZusammenfassung:\n';
            Object.values(byType).forEach(type => {
                if (type.count > 0) {
                    report += `  ${type.label}: ${type.count}x = ${type.total.toFixed(2)}€`;
                    if (type.tips > 0) report += ` (davon ${type.tips.toFixed(2)}€ Trinkgeld)`;
                    report += '\n';
                }
            });
            
            report += '\n' + '='.repeat(40) + '\n\n';
        });
        
        const grandTotal = shifts.reduce((sum, shift) => 
            sum + shift.rides.reduce((s, r) => s + r.totalAmount, 0), 0);
        const grandTotalBase = shifts.reduce((sum, shift) => 
            sum + shift.rides.reduce((s, r) => s + r.amount, 0), 0);
        const grandTotalTips = shifts.reduce((sum, shift) => 
            sum + shift.rides.reduce((s, r) => s + (r.tip || 0), 0), 0);
        
        report += `GESAMTSUMME: ${grandTotal.toFixed(2)}€\n`;
        if (grandTotalTips > 0) {
            report += `  Fahrpreise: ${grandTotalBase.toFixed(2)}€\n`;
            report += `  Trinkgeld: ${grandTotalTips.toFixed(2)}€\n`;
        }
        
        const blob = new Blob([report], { type: 'text/plain;charset=utf-8' });
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = `schicht-nachweis-${new Date().toISOString().split('T')[0]}.txt`;
        a.click();
        URL.revokeObjectURL(url);
    });

    // Clear all
    document.getElementById('clearBtn').addEventListener('click', function() {
        if (confirm('Wirklich ALLE Fahrten löschen? Diese Aktion kann nicht rückgängig gemacht werden!')) {
            shifts = [];
            saveData();
            renderShifts();
        }
    });

    // Initialize
    const now = new Date();
    document.getElementById('rideDate').value = now.toISOString().split('T')[0];
    document.getElementById('rideTime').value = now.toTimeString().substring(0, 5);
    
    loadData();
    }); // End DOMContentLoaded
</script>
